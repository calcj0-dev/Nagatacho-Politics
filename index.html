<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永田町ポリティクス｜無料で遊べる政治家カードゲーム</title>
  <meta name="description" content="自民党・維新・国民民主など6つの政党から選び、CPUと対戦する無料ブラウザカードゲーム。実在の政治家カードで支持率100%を目指せ！">
  <meta name="keywords" content="政治家カードゲーム,政治ゲーム,無料ゲーム,ブラウザゲーム,永田町,カードゲーム,政治,選挙">

  <!-- SNSシェア時の表示 -->
  <meta property="og:title"       content="永田町ポリティクス｜政治家カードゲーム">
  <meta property="og:description" content="6つの政党から選んでCPUと対戦する政治家カードゲーム。支持率100%達成で勝利！">
  <meta property="og:image"       content="https://nagatacho-politics.vercel.app/assets/item/game_screen.png">
  <meta property="og:url"         content="https://nagatacho-politics.vercel.app">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="永田町ポリティクス｜政治家カードゲーム">
  <meta name="twitter:description" content="6つの政党から選んでCPUと対戦する政治家カードゲーム。支持率100%達成で勝利！">
  <meta name="twitter:image"       content="https://nagatacho-politics.vercel.app/assets/item/game_screen.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <audio id="bgm" src="assets/audio/main_bgm.mp3" loop preload="auto"></audio>

  <!-- オープニング画面 -->
  <div id="opening-screen" class="screen">
    <div id="app-version" class="app-version"></div>
    <div class="opening-content">
      <h1 class="opening-title">永田町ポリティクス</h1>
      <p class="opening-subtitle">政治を、ゲームにする。</p>
      <div id="opening-logged-out" class="opening-buttons">
        <button id="opening-login-btn" class="auth-login-btn">Googleでログイン</button>
        <button id="opening-guest-btn" class="guest-btn">ゲストとして続ける</button>
      </div>
      <div id="opening-logged-in" class="opening-buttons hidden">
        <p id="opening-user-name" class="opening-user-name"></p>
        <button id="opening-continue-btn" class="game-start-btn">続ける</button>
      </div>
      <p class="opening-disclaimer">このゲームは風刺・パロディ目的の創作物です。実在の人物・政党とは関係ありません。</p>
    </div>
  </div>

  <!-- ゲーム開始画面 -->
  <div id="game-start-screen" class="screen hidden">
    <div class="screen-panel">
      <div id="auth-area">
        <div id="auth-logged-in" class="hidden">
          <img id="auth-avatar" src="" alt="" class="auth-avatar">
          <div class="auth-user-info">
            <div class="auth-player-name-row">
              <span id="game-start-player-name" class="game-start-player-name">---</span>
              <button id="player-name-edit-btn" class="player-name-edit-btn" title="プレイヤー名を変更">✏️</button>
            </div>
            <span id="auth-name" class="auth-google-name"></span>
          </div>
          <button id="auth-logout-btn">ログアウト</button>
        </div>
      </div>
      <h1 class="game-start-title">永田町ポリティクス</h1>
      <div id="game-start-stats" class="game-start-stats hidden">
        <span id="game-start-stats-text"></span>
        <button id="game-start-share-btn" class="game-start-share-btn" title="戦績をシェア">𝕏</button>
      </div>
      <div class="game-start-buttons">
        <button id="game-start-btn" class="game-start-btn">ゲームを始める</button>
        <button id="deck-edit-btn" class="deck-edit-btn hidden" disabled>デッキ編集（開発中）</button>
        <button id="ranking-btn" class="how-to-play-btn">連勝ランキング</button>
        <button id="how-to-play-btn-menu" class="how-to-play-btn">遊び方</button>
      </div>
    </div>
  </div>

  <!-- 政党選択画面 -->
  <div id="party-select-screen" class="screen hidden">
    <div class="screen-panel">
      <h1>政党を選んでください</h1>
      <div class="party-buttons">
        <button class="party-btn" data-party="自民党">
          <div class="party-btn-name">自民党</div>
          <div class="party-btn-catch">王道の安定感、豊富な資金力</div>
        </button>
        <button class="party-btn" data-party="国民民主党">
          <div class="party-btn-name">国民民主党</div>
          <div class="party-btn-catch">民意に直結、攻守バランス型</div>
        </button>
        <button class="party-btn" data-party="チームみらい">
          <div class="party-btn-name">チームみらい</div>
          <div class="party-btn-catch">新勢力の挑戦、スピード重視</div>
        </button>
        <button class="party-btn" data-party="維新の会">
          <div class="party-btn-name">維新の会</div>
          <div class="party-btn-catch">改革一本勝負、身を切る覚悟</div>
        </button>
        <button class="party-btn" data-party="参政党">
          <div class="party-btn-name">参政党</div>
          <div class="party-btn-catch">草の根から日本を守る</div>
        </button>
        <button class="party-btn" data-party="中道改革連合">
          <div class="party-btn-name">中道改革連合</div>
          <div class="party-btn-catch">バランスと改革、穏健な前進</div>
        </button>
      </div>
      <button id="party-select-back-btn" class="level-back-btn">← 戻る</button>
    </div>
  </div>

  <!-- CPUレベル選択画面 -->
  <div id="level-select-screen" class="screen hidden">
    <div class="screen-panel">
      <h1>CPUの強さを選んでください</h1>
      <div class="level-buttons">
        <button class="level-btn" data-level="1">
          <div class="level-btn-rank">★☆☆</div>
          <div class="level-btn-name">新人議員</div>
          <div class="level-btn-desc">気まぐれに動く</div>
        </button>
        <button class="level-btn" data-level="2">
          <div class="level-btn-rank">★★☆</div>
          <div class="level-btn-name">国会議員</div>
          <div class="level-btn-desc">標準的な強さ</div>
        </button>
        <button class="level-btn" data-level="3">
          <div class="level-btn-rank">★★★</div>
          <div class="level-btn-name">永田町の猛者</div>
          <div class="level-btn-desc">状況を読んで最適行動</div>
        </button>
      </div>
      <button class="level-back-btn" id="level-back-btn">← 政党選択に戻る</button>
    </div>
  </div>

  <!-- ランキング画面 -->
  <div id="ranking-screen" class="screen hidden">
    <div class="screen-panel ranking-panel">
      <h1 class="game-start-title">連勝ランキング</h1>
      <div id="ranking-list" class="ranking-list"></div>
      <button id="ranking-back-btn" class="level-back-btn">← 戻る</button>
    </div>
  </div>

  <!-- 読込中画面 -->
  <div id="loading-screen" class="screen hidden">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <div class="loading-text">読込中…</div>
    </div>
  </div>

  <!-- メニューへ戻る確認ダイアログ -->
  <div id="back-to-menu-dialog" class="back-to-menu-dialog hidden">
    <div class="back-to-menu-box">
      <div class="back-to-menu-title">メニューへ戻りますか？</div>
      <div class="back-to-menu-desc">ゲームの進行状況はリセットされます</div>
      <div class="back-to-menu-btns">
        <button id="back-to-menu-yes">戻る</button>
        <button id="back-to-menu-no">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="screen hidden">
    <!-- メニューへ戻るボタン（右上固定） -->
    <button id="menu-back-btn" title="メニューへ戻る">⌂</button>
    <button id="how-to-play-btn-game" class="how-to-play-btn">遊び方</button>

    <!-- CPU側 -->
    <div class="player-area cpu-area">
      <div id="cpu-hand" class="card-list cpu-hand"></div>
      <div class="player-info">
        <div class="player-info-row1">
          <span>【CPU】 <span id="cpu-party">???</span></span>
          <div class="approval-row">
            <span class="approval-label">支持率</span>
            <span id="cpu-approval" class="approval-num">???</span>
          </div>
        </div>
        <div class="player-info-funds">政治資金: <span id="cpu-funds">?億円</span></div>
      </div>
      <div class="field-row">
        <div id="cpu-field" class="field"></div>
        <div class="deck-slot-wrap">
          <div id="cpu-deck" class="deck-slot"></div>
          <span id="cpu-deck-count" class="deck-count">0</span>
        </div>
        <div class="deck-slot-wrap">
          <div id="cpu-discard" class="deck-slot discard-slot"></div>
          <button id="cpu-status-btn" class="status-btn">状態</button>
        </div>
      </div>
    </div>

    <!-- ターン情報バー -->
    <div id="turn-bar">
      <span id="turn-num">1 / 25</span>
      <div id="turn-survey" class="survey-countdown">
        <span class="survey-label">情勢調査</span>
        <div class="survey-pips" id="survey-pips">
          <div class="survey-pip" data-pip="0"></div>
          <div class="survey-pip" data-pip="1"></div>
          <div class="survey-pip" data-pip="2"></div>
          <div class="survey-pip" data-pip="3"></div>
          <div class="survey-pip" data-pip="4"></div>
        </div>
      </div>
      <span id="turn-owner">あなたのターン</span>
      <button id="end-turn-btn" disabled>終了 ▶</button>
    </div>

    <!-- プレイヤー側 -->
    <div class="player-area player-area-self">
      <div class="field-row">
        <div id="player-field" class="field"></div>
        <div class="deck-slot-wrap">
          <div id="player-deck" class="deck-slot"></div>
          <span id="player-deck-count" class="deck-count">0</span>
        </div>
        <div class="deck-slot-wrap">
          <div id="player-discard" class="deck-slot discard-slot"></div>
          <button id="player-status-btn" class="status-btn">状態</button>
        </div>
      </div>
      <div class="player-info">
        <div class="player-info-row1">
          <span>【あなた】 <span id="player-party">???</span></span>
          <div class="approval-row">
            <span class="approval-label">支持率</span>
            <div class="approval-bar-wrap">
              <div id="player-approval-bar" class="approval-bar"></div>
            </div>
            <span id="player-approval" class="approval-num">--%</span>
          </div>
        </div>
        <div class="player-info-funds">政治資金: <span id="player-funds">0億円</span></div>
      </div>
    </div>

    <!-- 手札 -->
    <div id="hand-area">
      <div id="player-hand" class="card-list"></div>
    </div>

  </div>

  <!-- オーバーレイ群（フェーズ2-3で実装） -->
  <div id="overlay" class="overlay hidden">
    <div id="overlay-content" class="overlay-content"></div>
  </div>

  <!-- プレイヤー名変更オーバーレイ -->
  <div id="profile-edit-overlay" class="profile-edit-overlay hidden">
    <div class="profile-edit-box">
      <h2 class="profile-edit-title">プレイヤー名を変更</h2>
      <input id="profile-edit-input" type="text" class="profile-edit-input" maxlength="16" placeholder="プレイヤー名（最大16文字）">
      <div class="profile-edit-btns">
        <button id="profile-edit-save-btn" class="game-start-btn" disabled>保存</button>
        <button id="profile-edit-cancel-btn" class="guest-btn">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-auth.js"></script>
  <script src="game.js"></script>
</body>
</html>
